<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bearylabs | Web Development Brand</title>
  <meta name="description"
    content="Bearylabs personal brand onepager for web development, coding, and digital product work." />
  <link rel="stylesheet" href="./dist/output.css" />
</head>

<body class="min-h-screen bg-base font-sans text-text">
  <div class="relative isolate overflow-hidden">
    <div
      class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(203,166,247,0.22),_transparent_32%),radial-gradient(circle_at_82%_18%,_rgba(137,180,250,0.18),_transparent_28%),radial-gradient(circle_at_60%_80%,_rgba(245,194,231,0.14),_transparent_26%),linear-gradient(135deg,_#11111b,_#181825_42%,_#1e1e2e)]">
    </div>
    <div
      class="absolute inset-0 -z-10 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:72px_72px] opacity-40">
    </div>
    <div class="absolute inset-y-0 left-1/2 -z-10 hidden w-px bg-white/6 lg:block"></div>

    <main class="mx-auto flex min-h-screen max-w-7xl items-center px-6 py-16 sm:px-10 lg:px-12">
      <section class="grid w-full items-center gap-14 lg:grid-cols-[minmax(0,1.05fr)_minmax(0,0.95fr)]">
        <div class="max-w-xl">
          <div
            class="mb-6 inline-flex items-center gap-3 rounded-full border border-white/10 bg-white/6 px-4 py-2 text-sm text-subtext1 backdrop-blur">
            <span class="h-2.5 w-2.5 shrink-0 rounded-full bg-green shadow-[0_0_18px_rgba(166,227,161,0.8)]"></span>
            bearylabs@webdev
          </div>
          <h1 class="text-5xl font-extrabold leading-tight text-white sm:text-6xl">
            <span class="text-lavender">bearylabs</span>
          </h1>
          <p class="mt-6 max-w-lg text-lg leading-8 text-subtext0">
            I build pragmatic software and infrastructure, focused on clean systems, performance, and control.
            I work hands-on with Linux, self-hosting, and modern tooling, turning ideas into reliable, real-world
            projects.
          </p>

          <div class="mt-8 flex flex-wrap gap-3 text-sm text-subtext1">
            <span
              class="inline-flex items-center rounded-full border border-white/10 bg-surface0/70 px-4 py-2 leading-none">Web
              Development</span>
            <span
              class="inline-flex items-center rounded-full border border-white/10 bg-surface0/70 px-4 py-2 leading-none">Open
              Source</span>
            <span
              class="inline-flex items-center rounded-full border border-white/10 bg-surface0/70 px-4 py-2 leading-none">DevOps</span>
          </div>


          <div class="mt-10">
            <a href="https://github.com/bearylabs" target="_blank" rel="noreferrer"
              class="inline-flex items-center gap-3 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-sm text-subtext0 backdrop-blur transition hover:bg-white/10">
              <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-surface0 text-white">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="h-5 w-5 fill-current">
                  <path
                    d="M12 2C6.477 2 2 6.484 2 12.017c0 4.426 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.866-.013-1.7-2.782.605-3.37-1.344-3.37-1.344-.455-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.004.07 1.532 1.032 1.532 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.026 2.747-1.026.546 1.378.203 2.397.1 2.65.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.31.678.921.678 1.857 0 1.34-.012 2.421-.012 2.75 0 .268.18.58.688.481A10.019 10.019 0 0 0 22 12.017C22 6.484 17.523 2 12 2Z" />
                </svg>
              </span>
              <span>
                <span class="block text-lg font-extrabold text-white">GitHub</span>
              </span>
            </a>
          </div>
        </div>

        <div class="relative">
          <div class="absolute -inset-6 -z-10 rounded-[2rem] bg-lavender/15 blur-3xl"></div>
          <div
            class="overflow-hidden rounded-[1.75rem] border border-white/10 bg-mantle/80 shadow-2xl shadow-black/50 backdrop-blur">
            <div class="flex items-center gap-2 border-b border-white/10 bg-white/5 px-5 py-4">
              <span class="h-3 w-3 rounded-full bg-[#ff5f57]"></span>
              <span class="h-3 w-3 rounded-full bg-[#febc2e]"></span>
              <span class="h-3 w-3 rounded-full bg-[#28c840]"></span>
            </div>

            <div
              class="relative min-h-[484px] overflow-hidden bg-[radial-gradient(circle_at_top,_rgba(137,180,250,0.14),_transparent_24%),radial-gradient(circle_at_20%_80%,_rgba(203,166,247,0.18),_transparent_24%),linear-gradient(180deg,_#1e1e2e,_#11111b)] p-6 sm:p-8">
              <div
                class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:44px_44px] opacity-30">
              </div>
              <div class="flex justify-center">
                <img src="./assets/bearylabs-logo.png" alt="Bearylabs logo" class="w-full  object-contain" />
              </div>
            </div>
          </div>
        </div>
  </div>
  </div>
  </section>
  </main>
  </div>
</body>

</html>
